spring.application.name=bellhaven-backend
server.port=8080

# MySQL database - update=persistent, keeps data between restarts.
spring.datasource.url=jdbc:mysql://localhost:3306/bellhaven?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=8008616404

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# data.sql runs after Hibernate creates/updates the tables from the entities
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# --- Email (booking confirmation) ---
# Uses Gmail's SMTP server. MAIL_USERNAME/MAIL_PASSWORD are read from
# environment variables so real credentials never get committed - set
# them in your shell, IDE run config, or a .env file loaded before boot.
# MAIL_PASSWORD must be a 16-char Gmail "App Password", NOT your normal
# Gmail login password (Google Account -> Security -> 2-Step Verification
# -> App passwords). Regular passwords will fail to authenticate.
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=bellheavenboutique@gmail.com
spring.mail.password=exyauvjcfrhkqeqx
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Shown as the "From" address on booking confirmation emails.
bellhaven.mail.from=bellheavenboutique@gmail.com